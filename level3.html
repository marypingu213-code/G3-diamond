<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：語詞填充</title>
    <script src="data.js"></script>
    <style>
        /* 基本樣式 */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #F0F8FF; /* 基礎版初始背景：淡藍色 */
            transition: background-color 1s ease; /* 背景變色時會有平滑過渡效果 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* 挑戰版發光特效 */
        .challenge-mode {
            border: 4px solid #ff4d4d;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.5) !important;
        }

        #status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 15px;
            background: #e1f5fe;
            color: #0288d1;
        }

        .question-text {
            font-size: 24px;
            line-height: 1.6;
            margin: 20px 0;
        }

        .answer-input {
            font-size: 20px;
            padding: 10px;
            width: 150px;
            border: 2px solid #ccc;
            border-radius: 10px;
            text-align: center;
        }

        button {
            font-size: 20px;
            padding: 10px 25px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="status-badge">🌱 基礎練習</div>
        <h1 id="lesson-title">載入中...</h1>
        
        <div class="question-text" id="question-display">
            </div>

        <input type="text" id="user-answer" class="answer-input" placeholder="請輸入答案">
        <br>
        <button onclick="checkAnswer()">提交答案</button>
        
        <p id="feedback"></p>
    </div>

    <script>
        // 假設從 URL 參數獲取課程 ID，例如 level3.html?lesson=4
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('lesson') || "4"; 
        
        let currentIndex = 0;
        const lessonData = allLessonsData[lessonId];
        const questions = lessonData.level3;

        // 初始化畫面
        document.getElementById("lesson-title").innerText = lessonData.title;
        showQuestion();

        function showQuestion() {
            // 🌟 自動變換背景與標籤邏輯
            const container = document.getElementById("game-container");
            const badge = document.getElementById("status-badge");

            if (currentIndex >= 9) {
                // 進入挑戰版 (第10題起)
                document.body.style.backgroundColor = "#FFF0F0"; // 變淡紅色
                container.classList.add("challenge-mode");
                badge.innerText = "🔥 挑戰模式";
                badge.style.background = "#ffebee";
                badge.style.color = "#d32f2f";
                
                if (currentIndex === 9) {
                    alert("🌱 基礎版完成！\n🚀 接下來進入挑戰版，試試看更長的句子吧！");
                }
            }

            const q = questions[currentIndex];
            document.getElementById("question-display").innerText = q.text;
            document.getElementById("user-answer").value = "";
            document.getElementById("feedback").innerText = "";
        }

        function checkAnswer() {
            const userAnswer = document.getElementById("user-answer").value.trim();
            const correctAnswer = questions[currentIndex].answer;

            if (userAnswer === correctAnswer) {
                document.getElementById("feedback").style.color = "green";
                document.getElementById("feedback").innerText = "太棒了！答對了！";
                
                // 延遲一下進入下一題
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < questions.length) {
                        showQuestion();
                    } else {
                        alert("恭喜你完成了本課所有練習！");
                        window.location.href = "lesson.html"; // 回到課程選單
                    }
                }, 1000);
            } else {
                document.getElementById("feedback").style.color = "red";
                document.getElementById("feedback").innerText = "再試試看喔！";
            }
        }
    </script>
</body>
</html>
