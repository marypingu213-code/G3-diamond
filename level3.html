<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：語詞填充我最行</title>
    <script src="data.js"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #F0F8FF;
            transition: background-color 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none; /* 防止拖曳時選取到文字 */
        }

        .main-container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 95%;
            text-align: center;
        }

        /* 語詞選單區（拖曳源） */
        .word-bank {
            background-color: #e3f2fd;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            border: 2px dashed #2196F3;
            min-height: 50px;
        }

        .word-item {
            background: #ffffff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            color: #1976D2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: grab;
            border: 2px solid #2196F3;
            transition: transform 0.2s;
        }

        .word-item:active { cursor: grabbing; transform: scale(1.1); }
        .word-item.dragging { opacity: 0.5; }

        /* 題目列表樣式 */
        .question-list { text-align: left; margin-top: 20px; }
        .question-row {
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 2;
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 放置目標格樣式 */
        .drop-zone {
            display: inline-flex;
            width: 140px;
            height: 45px;
            border: 2px dashed #bbb;
            border-radius: 10px;
            margin: 0 10px;
            background-color: #fafafa;
            vertical-align: middle;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .drop-zone.hover { background-color: #fff9c4; border-color: #fbc02d; }
        .drop-zone.filled { border: 2px solid #4CAF50; background-color: #e8f5e9; }
        .drop-zone.wrong { border: 2px solid #f44336; background-color: #ffebee; }

        /* 挑戰版隱藏區 */
        #challenge-section { display: none; margin-top: 40px; padding-top: 20px; border-top: 5px double #ff4d4d; }
        .challenge-header { color: #d32f2f; font-size: 28px; margin-bottom: 20px; font-weight: bold; text-align: center; }

        #finish-btn {
            font-size: 24px; padding: 15px 50px; background-color: #4CAF50; color: white;
            border: none; border-radius: 50px; cursor: pointer; margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 id="lesson-title">載入中...</h1>
        <p style="font-size: 1.3rem; color: #555; font-weight: bold;">請將正確的語詞「拖曳」到下方的空格中：</p>

        <div class="word-bank" id="word-bank"></div>

        <div class="question-list" id="basic-questions"></div>

        <div id="challenge-section">
            <div class="challenge-header">🔥 厲害！開啟挑戰練習 🔥</div>
            <div class="question-list" id="challenge-questions"></div>
        </div>

        <button id="finish-btn" onclick="checkFinal()">完成練習</button>
    </div>

    <script>
        // 修正第一課題目內容
        const customL1 = [
            { text: "藍藍的天空有白白的________。", answer: "雲朵" },
            { text: "小鳥拍拍________，飛得很高。", answer: "翅膀" },
            { text: "妹妹的________紅通通的，很可愛。", answer: "臉蛋" },
            { text: "下雨了，我要撐開漂亮的________。", answer: "雨傘" },
            { text: "玩具箱裡有一隻大大的綠色________。", answer: "恐龍" },
            { text: "狗狗把客廳弄得亂七八糟，真愛________。", answer: "搗亂" },
            { text: "鋼琴彈出的________，聽起來真美。", answer: "音符" },
            { text: "大老虎張開嘴巴大聲________。", answer: "吼叫" },
            { text: "爸爸穿上西裝的________，看起來好神氣。", answer: "模樣" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        let lessonId = urlParams.get('id') || "4"; 
        let lessonData = allLessonsData[lessonId];
        
        // 如果是第一課，使用修正後的內容
        let currentQuestions = (lessonId === "1") ? customL1 : lessonData.level3;

        document.getElementById("lesson-title").innerText = (lessonId === "1") ? "第一課：最美的模樣" : lessonData.title;

        function initGame() {
            renderWordBank();
            renderQuestions();
        }

        function renderWordBank() {
            const words = [...new Set(currentQuestions.map(q => q.answer))];
            words.sort(() => Math.random() - 0.5); // 隨機排序增加趣味
            const bank = document.getElementById("word-bank");
            words.forEach(word => {
                const div = document.createElement("div");
                div.className = "word-item";
                div.innerText = word;
                div.draggable = true;
                div.addEventListener("dragstart", (e) => {
                    e.dataTransfer.setData("text", word);
                    div.classList.add("dragging");
                });
                div.addEventListener("dragend", () => div.classList.remove("dragging"));
                bank.appendChild(div);
            });
        }

        function renderQuestions() {
            const basicContainer = document.getElementById("basic-questions");
            const challengeContainer = document.getElementById("challenge-questions");

            currentQuestions.forEach((q, index) => {
                const row = document.createElement("div");
                row.className = "question-row";
                const parts = q.text.split("________");
                
                row.innerHTML = `
                    ${index + 1}. ${parts[0]} 
                    <div class="drop-zone" data-answer="${q.answer}"></div> 
                    ${parts[1] || ""}
                `;

                if (index < 9) basicContainer.appendChild(row);
                else challengeContainer.appendChild(row);
            });

            // 綁定拖曳事件到所有 drop-zone
            document.querySelectorAll(".drop-zone").forEach(zone => {
                zone.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    zone.classList.add("hover");
                });
                zone.addEventListener("dragleave", () => zone.classList.remove("hover"));
                zone.addEventListener("drop", (e) => {
                    e.preventDefault();
                    zone.classList.remove("hover");
                    const droppedWord = e.dataTransfer.getData("text");
                    handleDrop(zone, droppedWord);
                });
            });
        }

        function handleDrop(zone, word) {
            const correctAnswer = zone.getAttribute("data-answer");
            if (word === correctAnswer) {
                zone.innerText = word;
                zone.className = "drop-zone filled";
                checkProgress();
            } else {
                zone.innerText = word;
                zone.className = "drop-zone wrong";
                setTimeout(() => {
                    zone.innerText = "";
                    zone.className = "drop-zone";
                }, 1000);
            }
        }

        let unlocked = false;
        function checkProgress() {
            const basicFilled = document.querySelectorAll("#basic-questions .drop-zone.filled").length;
            if (lessonId === "4" && basicFilled === 9 && !unlocked) {
                unlocked = true;
                document.getElementById("challenge-section").style.display = "block";
                document.body.style.backgroundColor = "#FFF0F0";
                alert("🔥 基礎練習全對！已開啟下方的挑戰組！");
            }
        }

        function checkFinal() {
            const totalRequired = currentQuestions.length;
            const currentFilled = document.querySelectorAll(".drop-zone.filled").length;
            if (currentFilled < totalRequired && !(lessonId === "4" && currentFilled === 9)) {
                alert("加油！還有題目沒完成喔！");
            } else {
                alert("🎉 太棒了！全部完成練習！");
                window.location.href = `lesson.html?id=${lessonId}`;
            }
        }

        initGame();
    </script>
</body>
</html>
