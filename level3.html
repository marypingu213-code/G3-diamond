<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：語詞填充我最行</title>
    <script src="data.js"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #F0F8FF;
            transition: background-color 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .main-container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 95%;
            text-align: center;
        }

        /* 上方語詞庫樣式 */
        .word-bank {
            background-color: #e3f2fd;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            border: 2px dashed #2196F3;
        }

        .word-item {
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            color: #1976D2;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        /* 題目列表樣式 */
        .question-list {
            text-align: left;
            margin-top: 20px;
        }

        .question-row {
            font-size: 22px;
            margin-bottom: 25px;
            line-height: 1.6;
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .answer-input {
            font-size: 20px;
            padding: 5px 10px;
            width: 120px;
            margin: 0 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s;
        }

        .answer-input.correct {
            border-color: #4CAF50;
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        /* 挑戰版區塊預設隱藏 */
        #challenge-section {
            display: none;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 5px double #ff4d4d;
        }

        .challenge-header {
            color: #d32f2f;
            font-size: 28px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button#finish-btn {
            font-size: 24px;
            padding: 15px 50px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 id="lesson-title">載入中...</h1>
        
        <p style="font-size: 1.2rem; color: #666;">請參考提示語詞，在空格中輸入正確答案：</p>

        <div class="word-bank" id="word-bank">
            </div>

        <div class="question-list" id="basic-questions">
            </div>

        <div id="challenge-section">
            <div class="challenge-header">🔥 恭喜進階！挑戰組練習 🔥</div>
            <div class="question-list" id="challenge-questions">
                </div>
        </div>

        <button id="finish-btn" onclick="checkAllAndFinish()">完成練習</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let lessonId = urlParams.get('id') || "4"; 
        const lessonData = allLessonsData[lessonId];
        const allQuestions = lessonData.level3;

        document.getElementById("lesson-title").innerText = lessonData.title;

        // 1. 生成語詞庫 (去重處理)
        function renderWordBank() {
            const words = [...new Set(allQuestions.map(q => q.answer))];
            const bank = document.getElementById("word-bank");
            words.forEach(word => {
                const div = document.createElement("div");
                div.className = "word-item";
                div.innerText = word;
                bank.appendChild(div);
            });
        }

        // 2. 生成題目列表
        function renderQuestions() {
            const basicContainer = document.getElementById("basic-questions");
            const challengeContainer = document.getElementById("challenge-questions");

            allQuestions.forEach((q, index) => {
                const row = document.createElement("div");
                row.className = "question-row";
                
                // 將題目文字中的 ________ 替換成 input 框
                const parts = q.text.split("________");
                row.innerHTML = `
                    ${index + 1}. ${parts[0]} 
                    <input type="text" class="answer-input" data-answer="${q.answer}" oninput="checkSingle(this)"> 
                    ${parts[1] || ""}
                    <span class="status-icon" style="margin-left:10px;"></span>
                `;

                // 前 9 題放基礎，之後放挑戰
                if (index < 9) {
                    basicContainer.appendChild(row);
                } else {
                    challengeContainer.appendChild(row);
                }
            });
        }

        // 3. 即時檢查單題答案
        function checkSingle(input) {
            const userAnswer = input.value.trim();
            const correctAnswer = input.getAttribute("data-answer");
            const icon = input.nextElementSibling;

            if (userAnswer === correctAnswer) {
                input.classList.add("correct");
                input.disabled = true; // 答對就鎖定
                icon.innerText = "✅";
                checkProgress(); // 檢查是否達標進階
            }
        }

        // 4. 檢查進度：是否完成前 9 題
        let challengeUnlocked = false;
        function checkProgress() {
            const basicInputs = document.querySelectorAll("#basic-questions .answer-input");
            const correctCount = Array.from(basicInputs).filter(input => input.classList.contains("correct")).length;

            if (correctCount === 9 && !challengeUnlocked) {
                challengeUnlocked = true;
                unlockChallenge();
            }
        }

        // 5. 開啟挑戰組
        function unlockChallenge() {
            alert("🌟 太厲害了！前 9 題全部答對！\n下方已開啟「🔥 挑戰組練習」，試試看吧！");
            document.body.style.backgroundColor = "#FFF0F0"; 
            document.getElementById("challenge-section").style.display = "block";
            // 捲動到挑戰區
            document.getElementById("challenge-section").scrollIntoView({ behavior: 'smooth' });
        }

        function checkAllAndFinish() {
            const allInputs = document.querySelectorAll(".answer-input:not([disabled])");
            if (allInputs.length > 0 && !challengeUnlocked) {
                alert("加油！基礎組還有題目沒完成喔！");
            } else {
                alert("🎉 恭喜完成練習！");
                window.location.href = `lesson.html?id=${lessonId}`;
            }
        }

        // 初始化
        renderWordBank();
        renderQuestions();
    </script>
</body>
</html>
