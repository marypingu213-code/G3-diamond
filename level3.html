<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：語詞填充</title>
    <script src="data.js"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #F0F8FF;
            transition: background-color 0.8s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        #game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 95%;
            text-align: center;
            margin-top: 50px;
        }

        /* 挑戰版發光特效 */
        .challenge-mode-container {
            border: 5px solid #ff4d4d !important;
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.6) !important;
        }

        #status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: #e1f5fe;
            color: #0288d1;
        }

        .question-text {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.8;
            margin: 30px 0;
            color: #333;
        }

        .answer-input {
            font-size: 22px;
            padding: 12px;
            width: 80%;
            border: 2px solid #ddd;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .submit-btn {
            font-size: 22px;
            padding: 12px 45px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #388E3C;
        }

        .submit-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #feedback {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            min-height: 35px;
        }

        /* 過場畫面樣式 */
        #transition-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 77, 77, 0.95);
            color: white;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="transition-screen">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px;">🌱 基礎組完成！</h1>
        <p style="font-size: 1.8rem; margin-bottom: 30px;">表現太棒了！準備好進入更難的「🔥 挑戰組」了嗎？</p>
        <button onclick="startChallengeGroup()" style="background: white; color: #ff4d4d; font-size: 26px; padding: 15px 50px; border-radius: 15px; border:none; cursor:pointer; font-weight:bold;">開始挑戰！</button>
    </div>

    <div id="game-container">
        <div id="status-badge">載入中...</div>
        <h2 id="lesson-title" style="color: #5a4a42; margin-top: 0;">載入中...</h2>
        
        <div class="question-text" id="question-display"></div>

        <input type="text" id="user-answer" class="answer-input" placeholder="請輸入答案" autocomplete="off">
        <br>
        <button class="submit-btn" onclick="checkAnswer()">提交答案</button>
        
        <div id="feedback"></div>
    </div>

    <script>
        // 1. 統一使用 'id' 作為參數名稱（與選單頁對接）
        const urlParams = new URLSearchParams(window.location.search);
        let lessonId = urlParams.get('id'); 

        // 預設保護機制：若沒抓到 ID 則預設為第四課
        if (!lessonId) { lessonId = "4"; }

        // 2. 抓取對應資料
        const lessonData = allLessonsData[lessonId];
        const questions = lessonData.level3; 
        let currentIndex = 0; 

        document.getElementById("lesson-title").innerText = lessonData.title;

        function showQuestion() {
            const badge = document.getElementById("status-badge");
            const q = questions[currentIndex];

            // 3. 題號顯示邏輯
            if (lessonId === "4") {
                // 第四課專屬：分基礎與挑戰 (18題)
                if (currentIndex < 9) {
                    badge.innerText = `🌱 基礎練習 (${currentIndex + 1}/9)`;
                    badge.style.background = "#e1f5fe";
                    badge.style.color = "#0288d1";
                } else {
                    badge.innerText = `🔥 挑戰練習 (${currentIndex - 8}/9)`;
                    badge.style.background = "#ffebee";
                    badge.style.color = "#d32f2f";
                }
            } else {
                // 其他課次顯示一般進度
                badge.innerText = `題目進度 (${currentIndex + 1}/${questions.length})`;
            }

            document.getElementById("question-display").innerText = q.text;
            document.getElementById("user-answer").value = "";
            document.getElementById("feedback").innerText = "";
            document.getElementById("user-answer").focus();
        }

        function checkAnswer() {
            const userAnswer = document.getElementById("user-answer").value.trim();
            const correctAnswer = questions[currentIndex].answer;

            if (userAnswer === correctAnswer) {
                document.getElementById("feedback").style.color = "green";
                document.getElementById("feedback").innerText = "✔ 太棒了！答對了！";
                
                setTimeout(() => {
                    currentIndex++;
                    
                    // 🌟 關鍵：當第四課做完第 9 題時觸發過場
                    if (lessonId === "4" && currentIndex === 9) {
                        showTransition();
                    } else if (currentIndex < questions.length) {
                        showQuestion();
                    } else {
                        alert("🎉 恭喜！你完成了本課所有的練習！");
                        window.location.href = `lesson.html?id=${lessonId}`;
                    }
                }, 800);
            } else {
                document.getElementById("feedback").style.color = "red";
                document.getElementById("feedback").innerText = "❌ 再試試看喔！";
            }
        }

        function showTransition() {
            document.getElementById("transition-screen").style.display = "flex";
        }

        function startChallengeGroup() {
            document.getElementById("transition-screen").style.display = "none";
            
            // 視覺切換效果
            document.body.style.backgroundColor = "#FFF0F0"; 
            document.getElementById("game-container").classList.add("challenge-mode-container");
            
            showQuestion();
        }

        // 初始啟動
        showQuestion();

        // 支援 Enter 鍵提交
        document.getElementById("user-answer").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkAnswer();
        });
    </script>
</body>
</html>
