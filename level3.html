    <style>

        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--primary-bg); color: white; text-align: center; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .game-container { background-color: var(--container-bg); padding: 40px; border-radius: 30px; width: 95%; max-width: 1200px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); border: 4px solid #455a64; }
        h2 { font-size: 42px; color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-top: 0; }
        .stage-indicator { font-size: 28px; color: #3498db; margin-bottom: 20px; font-weight: bold; background: rgba(0,0,0,0.2); display: inline-block; padding: 5px 20px; border-radius: 10px; }
        .word-bank { background: #1a252f; padding: 25px; border-radius: 20px; margin-bottom: 40px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; border: 4px dashed #f1c40f; min-height: 100px; }
        .word-item { background: var(--word-bg); color: #2c3e50; padding: 15px 30px; border-radius: 15px; font-weight: 900; font-size: 32px; cursor: grab; user-select: none; box-shadow: 0 6px 0 #d4ac0d; transition: 0.2s; }
        .quiz-area { text-align: left; background: rgba(0,0,0,0.1); padding: 30px; border-radius: 20px; }
        .question { font-size: 32px; margin: 25px 0; line-height: 1.8; display: flex; align-items: center; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .drop-zone { min-width: 160px; height: 60px; border: 3px dashed #f1c40f; margin: 5px 15px; display: inline-flex; align-items: center; justify-content: center; background: var(--drop-bg); border-radius: 12px; transition: 0.3s; font-size: 32px; color: #f1c40f; font-weight: bold; }
        .drop-zone.filled { background: #ffffff; color: #2c3e50; border: none; border-bottom: 6px solid #bdc3c7; }
        .check-btn { background-color: var(--correct-color); color: white; border: none; padding: 20px 60px; font-size: 36px; border-radius: 60px; cursor: pointer; margin-top: 40px; font-weight: 900; box-shadow: 0 8px 0 #27ae60; }
    </style>
</head>
<body>

        },

        },
        "3": {
            title: "第三課：語詞我最行",
            s1: { words: ["炎熱", "愛玉", "甜品", "曬乾", "斑點", "搓洗", "容器", "棉袋", "糖水"], 
                  qs: ["太陽好大，天氣很 @ 。", "我喜歡吃涼涼的 @ 。", "蛋糕是甜甜的 @ 。", "衣服洗好了拿去 @ 。", "小狗身上有黑色的 @ 。", "我們在水裡用力 @ 愛玉子。", "爸爸把水倒進透明的 @ 。", "把種子裝進小 @ 。", "冰水裡加點 @ 好好喝。"] },
            s2: { words: ["炎熱", "曬乾", "斑點", "甜品", "棉袋", "搓洗", "愛玉", "糖水", "容器"], 
                  qs: ["夏天的太陽好大，天氣 @ 。", "洗好的衣服掛在陽台 @ 。", "校狗拉拉身上布滿 @ 。", "晚餐後喜歡吃蛋糕當 @ 。", "我們把種子放進小 @ 裡。", "盆子裡用力 @ 出現果膠。", "冰涼的 @ 凍吃起來QQ的。", "紅豆湯加上 @ 更香甜。", "水果裝進乾淨的 @ 裡。"] }
        },
        "4": {
            title: "第四課：語詞我最行",
            s1: { words: ["吃驚", "奶酪", "門框", "出差", "眼神", "反應", "官府", "丞相", "回報"], 
                  qs: ["妹妹張大嘴巴，一臉 @ 。", "冰箱裡有一盒甜甜的 @ 。", "哥哥手不小心撞到了 @ 。", "爸爸去外地 @ 。", "看到好朋友受傷， @ 充滿擔心。", "躲避球的 @ 也非常快。", "以前被欺負會去 @ 找官員。", "諸葛亮是古代有名的 @ 。", "回教室向老師 @ 比分。"] },
            s2: { words: ["反應", "吃驚", "官府", "門框", "眼神", "丞相", "奶酪", "回報"], 
                  qs: ["小運動員的 @ 非常靈敏。", "看到牆壁被塗鴉，媽媽很 @ 。", "百姓前往 @ 請官員主持公道。", "弟弟頭頂快碰到 @ 了。", "老師從他的 @ 中看出自信。", "諸葛亮是一位有智慧的 @ 。", "濃郁香甜的 @ 是點心。", "班長向大家 @ 比賽結果。"] }
        },
        "5": {
            title: "第五課：語詞我最行",
            s1: { words: ["鞠躬", "弄哭", "厲害", "鬥嘴", "逗趣", "閉眼", "警察", "小偷", "胡說"], 
                  qs: ["表演結束了，小明有禮貌向大家 @ 。", "哥哥不小心弄壞玩具，把她 @ 了。", "能在十秒跑完百米，體育很 @ 。", "兩人為了玩玩具而 @ ，不讓誰。", "小猴子抓癢動作非常 @ ，大家笑。", "捉迷藏時，當鬼的人要先 @ 數十。", " @ 叔叔的工作是抓壞人，守安全。", "商店裡東西被 @ 偷偷搬走，老闆傷心。", "說謊是不對的，我們不能隨便 @ 。"] },
            s2: { words: ["鞠躬", "弄哭", "厲害", "鬥嘴", "逗趣", "閉眼", "警察", "小偷", "胡說", "厲害"], 
                  qs: ["台上的演員向觀眾深深一 @ 表示感謝。", "哥哥不小心弄壞心愛玩偶，把她 @ 了。", "小明獲得全國第一名，大家都讚他 @ 。", "雖然平時愛 @ ，遇到困難還是幫忙。", "馬戲團小丑表演非常 @ ，全場大笑。", "睡覺前，我習慣先 @ 冥想放鬆。", "正義的 @ 叔叔巡邏，保護財產安全。", "那名 @ 趁四下無人，爬窗進入行竊。", "請不要在這裡 @ ，沒有證據指責不對。", "魔術師的手法非常 @ ，看不出破綻。"] }
        },
        "6": {
            title: "第六課：語詞我最行",
            s1: { words: ["村莊", "發抖", "彈簧", "松鼠", "混亂", "建造", "展開", "巨大", "觀看"], 
                  qs: ["山腳下有幾間小房子，那是漂亮的 @ 。", "外面好冷，小貓凍得不停 @ 。", "原子筆裡有小 @ ，按下去彈起來。", "樹林裡有隻小 @ ，正在找果實。", "弟弟把玩具灑一地，房間很 @ 。", "螞蟻分工合作，在泥土裡 @ 牠們家。", "老師把大畫紙 @ 在桌上教畫畫。", "大鯨魚身體非常 @ ，比小船大。", "全家人去公園 @ 精彩表演。"] },
            s2: { words: ["村莊", "發抖", "彈簧", "松鼠", "混亂", "建造", "展開", "巨大", "觀看"], 
                  qs: ["山腳下有一個安靜的小 @ ，空氣清新。", "寒流來時，大家都被凍得不停 @ 。", "彈珠床裡有很多 @ ，非常有彈性。", "可愛的 @ 正忙著在樹枝間跳躍。", "地震過後，商店貨架倒地畫面很 @ 。", "工程人員正在學校旁邊 @ 游泳池。", "弟弟把畫好的圖畫 @ 開來展示。", "遠處出現了一座 @ 雕像，比樓還高。", "周末爸爸帶我們去棒球場 @ 比賽。"] }
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lesson') || "1";
    const currentLesson = allLessonContent[lessonId];

    document.getElementById('main-title').innerText = currentLesson.title;
    let currentStage = 1;

    function initStage(stageNum) {
        const data = stageNum === 1 ? currentLesson.s1 : currentLesson.s2;
        document.getElementById('stageText').innerText = stageNum === 1 ? "第一階段：基礎練習" : "第二階段：挑戰練習";
        
        const wordBank = document.getElementById('wordBank');
        wordBank.innerHTML = '';
        [...data.words].sort(() => Math.random() - 0.5).forEach(w => {
            const div = document.createElement('div');
            div.className = 'word-item'; div.innerText = w; div.draggable = true; div.id = 'word-' + w;
            div.ondragstart = e => e.dataTransfer.setData('text', w);
            wordBank.appendChild(div);
        });

        const quizArea = document.getElementById('quizArea');
        quizArea.innerHTML = '';
        data.qs.forEach((q, i) => {
            const parts = q.split('@');
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `${i+1}. ${parts[0]} <div class="drop-zone" data-ans="${data.words[i]}"></div> ${parts[1] || ''}`;
            quizArea.appendChild(qDiv);
        });

        setupDragLogic();
    }

    function setupDragLogic() {
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.ondragover = e => e.preventDefault();
            zone.ondrop = e => {
                e.preventDefault();
                const word = e.dataTransfer.getData('text');
                if (zone.innerText !== "") {
                   const oldWord = document.getElementById('word-' + zone.innerText);
                   if(oldWord) oldWord.style.display = 'block';
                }
                zone.innerText = word; zone.classList.add('filled');
                const targetWord = document.getElementById('word-' + word);
                if(targetWord) targetWord.style.display = 'none';
            };
            zone.onclick = () => {
                if (zone.innerText !== "") {
                    const oldWord = document.getElementById('word-' + zone.innerText);
                    if(oldWord) oldWord.style.display = 'block';
                    zone.innerText = ""; zone.classList.remove('filled');
                }
            };
        });
    }

    function checkAnswers() {
        const zones = document.querySelectorAll('.drop-zone');
        let correctCount = 0;
        zones.forEach(z => {
            if (z.innerText === z.dataset.ans) { z.style.backgroundColor = "#2ecc71"; z.style.color = "white"; correctCount++; }
            else { z.style.backgroundColor = "#e74c3c"; z.style.color = "white"; }
        });

        if (correctCount === zones.length) {
            if (currentStage === 1) {
                alert("🏆 基礎全對！準備進入挑戰練習！");
                currentStage = 2; initStage(2); window.scrollTo(0, 0);
            } else {
                alert("🎉 恭喜！你完成了本課所有挑戰！");
                location.href = 'index.html';
            }
        } else {
            alert("還有地方不對喔，再檢查一下紅色的格子！");
        }
    }
    initStage(1);
</script>
</body>
</html>
