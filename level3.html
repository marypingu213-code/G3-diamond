<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：語詞填充我最行</title>
    <script src="data.js"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #eef2f5; 
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 改為從上方開始排，避免內容太多時上下被截斷 */
            min-height: 100vh;
            margin: 0;
            padding: 30px 4%; /* 外圍留一點呼吸空間 */
            box-sizing: border-box;
            user-select: none;
        }

        /* 滿版大白框 */
        .canvas-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 1600px; /* 放寬最大寬度，充分利用大螢幕 */
            padding: 50px 4%;
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        /* 頂部標題與按鈕區 */
        .header-area {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        h1 {
            color: #2c3e50;
            font-size: clamp(32px, 3.5vw, 55px);
            margin: 0;
        }

        .header-btns {
            display: flex;
            gap: 15px;
        }

        .back-btn {
            text-decoration: none;
            color: #ffffff;
            font-size: clamp(16px, 1.5vw, 24px);
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        
        .home-btn { background-color: #3498db; border: 2px solid #2980b9; }
        .home-btn:hover { background-color: #2980b9; transform: scale(1.05); }
        
        .lesson-btn { background-color: #95a5a6; border: 2px solid #7f8c8d; }
        .lesson-btn:hover { background-color: #7f8c8d; transform: scale(1.05); }

        .subtitle {
            color: #7f8c8d;
            font-size: clamp(20px, 2vw, 30px);
            margin: 20px 0 40px 0;
            font-weight: bold;
        }

        /* 語詞選單區放大 */
        .word-bank {
            background-color: #f8f9fa;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            border: 3px dashed #3498db;
        }

        .word-item {
            background: #ffffff;
            padding: 12px 25px;
            border-radius: 15px;
            font-size: clamp(22px, 2.2vw, 36px); /* 放大語詞卡片 */
            font-weight: bold;
            color: #2980b9;
            box-shadow: 0 6px 10px rgba(0,0,0,0.08);
            cursor: grab;
            border: 3px solid #3498db;
            transition: transform 0.1s;
        }
        .word-item:active { cursor: grabbing; transform: scale(1.1); }

        /* 題目清單樣式放大 */
        .question-list { text-align: left; max-width: 1300px; margin: 0 auto; }
        .question-row {
            font-size: clamp(24px, 2.2vw, 38px); /* 放大題目字體 */
            margin-bottom: 30px;
            line-height: 2;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            color: #34495e;
            font-weight: bold;
        }

        /* 拖曳放置區放大 */
        .drop-zone {
            display: inline-flex;
            width: clamp(140px, 12vw, 220px); /* 框框加長加大 */
            height: clamp(45px, 4vw, 65px);
            border: 3px dashed #bdc3c7;
            border-radius: 12px;
            margin: 0 12px;
            background-color: #fff;
            vertical-align: middle;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #2c3e50;
            transition: 0.2s;
        }

        .drop-zone.hover { background-color: #e3f2fd; border-color: #3498db; transform: scale(1.05); }
        .drop-zone.filled { border: 3px solid #2ecc71; background-color: #f0fff4; color: #27ae60; }
        .drop-zone.wrong { border: 3px solid #e74c3c; background-color: #fff5f5; }

        /* 挑戰區樣式 */
        #challenge-section { display: none; margin-top: 50px; border-top: 5px double #e74c3c; padding-top: 30px; }
        .challenge-title { color: #e74c3c; font-size: clamp(28px, 2.5vw, 40px); font-weight: bold; margin-bottom: 30px; }

        .submit-btn {
            background-color: #2ecc71; 
            color: white;
            font-size: clamp(24px, 2.2vw, 36px);
            font-weight: bold;
            padding: 15px 50px;
            border: 4px solid #27ae60;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 40px;
            transition: 0.2s;
            box-shadow: 0 8px 0 #27ae60;
        }
        .submit-btn:active { transform: translateY(8px); box-shadow: none; }

        /* 手機與平板適應 */
        @media (max-width: 768px) {
            .header-area { flex-direction: column; gap: 20px; }
            .question-row { line-height: 1.6; }
            .drop-zone { margin: 10px 5px; } /* 窄螢幕時框框不要黏太緊 */
        }
    </style>
</head>
<body>

<div class="canvas-container">
    <div class="header-area">
        <h1 id="lesson-title">載入中...</h1>
        <div class="header-btns">
            <a href="index.html" class="back-btn home-btn">🏠 回總大廳</a>
            <a href="#" id="back-btn" class="back-btn lesson-btn">🔙 回課程選單</a>
        </div>
    </div>
    
    <p class="subtitle">🎯 請將上方的語詞，拖曳至正確的空格中</p>

    <div class="word-bank" id="word-bank"></div>

    <div class="question-list" id="basic-questions"></div>

    <div id="challenge-section">
        <div class="challenge-title">🔥 挑戰組練習</div>
        <div class="question-list" id="challenge-questions"></div>
    </div>

    <button class="submit-btn" onclick="checkFinal()">完成練習 ➡️</button>
</div>

<script>
    // 1. 修正第一課數據 (保留您原本客製化的資料)
    const customL1 = [
        { text: "藍藍的天空有白白的________。", answer: "雲朵" },
        { text: "小鳥拍拍________，飛得很高。", answer: "翅膀" },
        { text: "妹妹的________紅通通的，很可愛。", answer: "臉蛋" },
        { text: "下雨了，我要撐開漂亮的________。", answer: "雨傘" },
        { text: "玩具箱裡有一隻大大的綠色________。", answer: "恐龍" },
        { text: "狗狗把客廳弄得亂七八糟，真愛________。", answer: "搗亂" },
        { text: "鋼琴彈出的________，聽起來真美。", answer: "音符" },
        { text: "大老虎張開嘴巴大聲________。", answer: "吼叫" },
        { text: "爸爸穿上西裝的________，看起來好神氣。", answer: "模樣" }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('id') || "4"; 
    
    // 設定回課程選單的連結
    document.getElementById('back-btn').href = `lesson.html?id=${lessonId}`;

    let currentQuestions = (lessonId === "1") ? customL1 : allLessonsData[lessonId].level3;

    document.getElementById("lesson-title").innerText = (lessonId === "1") ? "第一課：最美的模樣" : allLessonsData[lessonId].title;

    function init() {
        if (!currentQuestions || currentQuestions.length === 0) {
            document.getElementById("basic-questions").innerHTML = "<h2 style='text-align:center; color:#e74c3c;'>此課程尚未建立題目喔！</h2>";
            document.getElementById("word-bank").style.display = "none";
            document.querySelector(".submit-btn").style.display = "none";
            return;
        }

        // 生成語詞庫
        const words = [...new Set(currentQuestions.map(q => q.answer))].sort(() => Math.random() - 0.5);
        const bank = document.getElementById("word-bank");
        words.forEach(word => {
            const el = document.createElement("div");
            el.className = "word-item";
            el.innerText = word;
            el.draggable = true;
            el.ondragstart = (e) => e.dataTransfer.setData("text", word);
            bank.appendChild(el);
        });

        // 生成題目
        const basicBox = document.getElementById("basic-questions");
        const challengeBox = document.getElementById("challenge-questions");

        currentQuestions.forEach((q, i) => {
            const row = document.createElement("div");
            row.className = "question-row";
            const parts = q.text.split("________");
            row.innerHTML = `${i+1}. ${parts[0]} <div class="drop-zone" data-answer="${q.answer}"></div> ${parts[1]||""}`;
            
            if (i < 9) basicBox.appendChild(row);
            else challengeBox.appendChild(row);
        });

        // 綁定拖曳邏輯
        document.querySelectorAll(".drop-zone").forEach(zone => {
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add("hover"); };
            zone.ondragleave = () => zone.classList.remove("hover");
            zone.ondrop = (e) => {
                e.preventDefault();
                zone.classList.remove("hover");
                const word = e.dataTransfer.getData("text");
                if(word === zone.dataset.answer) {
                    zone.innerText = word;
                    zone.className = "drop-zone filled";
                    checkProgress();
                } else {
                    zone.className = "drop-zone wrong";
                    setTimeout(() => zone.className = "drop-zone", 800);
                }
            };
        });
    }

    function checkProgress() {
        const filled = document.querySelectorAll("#basic-questions .drop-zone.filled").length;
        // 如果是第四課且基礎9題完成，解鎖挑戰區
        if (lessonId === "4" && filled === 9 && currentQuestions.length > 9) {
            document.getElementById("challenge-section").style.display = "block";
            document.querySelector(".canvas-container").style.border = "4px solid #e74c3c";
        }
    }

    function checkFinal() {
        const required = currentQuestions.length;
        const current = document.querySelectorAll(".drop-zone.filled").length;
        if (current < required) {
            alert("加油！還有空格還沒填完喔！");
        } else {
            alert("🎉 太棒了！全部答對了！");
            window.location.href = `lesson.html?id=${lessonId}`;
        }
    }

    init();
</script>
</body>
</html>
