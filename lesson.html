<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程選單</title>
    <script src="data.js"></script>
    <style>
        /* 讓 body 直接套用背景，拿掉邊距 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #fdf5e6; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
        }
        
        /* 徹底 100% 滿版 */
        .main-container { 
            position: relative; 
            width: 100%; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 4%; 
            box-sizing: border-box; 
        }

        .header-area { 
            text-align: center; 
            margin-bottom: 50px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        .back-btn { 
            position: absolute; 
            left: 20px; 
            background-color: #3498db; 
            color: white; 
            text-decoration: none; 
            font-size: clamp(18px, 1.8vw, 26px); 
            padding: 15px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .back-btn:hover { background-color: #2980b9; transform: scale(1.05); }

        h1 { color: #5a4a42; font-size: clamp(36px, 4vw, 65px); margin: 0; }

        .cards-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 40px; 
            width: 100%; 
            max-width: 1600px;
            flex-grow: 1; 
            align-content: center; 
        }

        .level-card { 
            background: white; 
            border-radius: 25px; 
            border: 6px solid transparent; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 50px 20px; 
            text-decoration: none; 
            transition: 0.3s; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            min-height: 280px; 
        }

        .level-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }

        .icon { font-size: clamp(70px, 7vw, 120px); margin-bottom: 25px; }
        .level-num { font-size: clamp(22px, 1.8vw, 30px); font-weight: bold; margin-bottom: 12px; }
        .level-name { font-size: clamp(28px, 2.5vw, 40px); font-weight: bold; }

        #btn-l1 { border-color: #ff9ff3; color: #f368e0; }
        #btn-l2 { border-color: #feca57; color: #ff9f43; }
        #btn-l3 { border-color: #1dd1a1; color: #10ac84; }
        #btn-l4 { border-color: #48dbfb; color: #0abde3; }

        @media (max-width: 768px) {
            .header-area { flex-direction: column; gap: 20px; margin-bottom: 30px; }
            .back-btn { position: relative; left: 0; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-area">
            <a href="index.html" class="back-btn">🏠 回首頁</a>
            <h1 id="lesson-title">載入中...</h1>
        </div>
        <div class="cards-container">
            <a href="#" id="btn-l1" class="level-card">
                <div class="icon">🧩</div><div class="level-num">第一關</div><div class="level-name">部件拼拼樂</div>
            </a>
            <a href="#" id="btn-l2" class="level-card">
                <div class="icon">🃏</div><div class="level-num">第二關</div><div class="level-name">語詞大挑戰</div>
            </a>
            <a href="#" id="btn-l3" class="level-card">
                <div class="icon">🕵️‍♂️</div><div class="level-num">第三關</div><div class="level-name">語詞我最行</div>
            </a>
            <a href="#" id="btn-l4" class="level-card">
                <div class="icon">👑</div><div class="level-num">第四關</div><div class="level-name">圖字配對</div>
            </a>
        </div>
    </div>
    
    <script>
        // 1. 將課文資料直接寫在這裡，雙重保險！
        const localLessonsData = {
            "1": "第一課：最美的模樣",
            "2": "第二課：玩玩具",
            "3": "第三課：愛玉的變身術",
            "4": "第四課：楊修猜字",
            "5": "第五課：唱反調",
            "6": "第六課：一飛沖天",
            "7": "第七課：井仔腳鹽田",
            "8": "第八課：和魚一起游泳",
            "9": "第九課：三峽老街樂藍染",
            "10": "第十課：地球的眼淚",
            "11": "第十一課：枯木是大飯店",
            "12": "第十二課：騎樓"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1";
        
        // 2. 判斷邏輯：先看 data.js 有沒有資料，沒有就用上面的 localLessonsData
        if (typeof allLessonsData !== 'undefined' && allLessonsData[lessonId]) {
            document.getElementById('lesson-title').innerText = allLessonsData[lessonId].title;
        } else if (localLessonsData[lessonId]) {
            document.getElementById('lesson-title').innerText = localLessonsData[lessonId];
        } else {
            document.getElementById('lesson-title').innerText = "未知的課文";
        }

        // 3. 把 id 繼續傳遞給後面的四個關卡
        document.getElementById('btn-l1').href = `level1.html?id=${lessonId}`;
        document.getElementById('btn-l2').href = `level2.html?id=${lessonId}`;
        document.getElementById('btn-l3').href = `level3.html?id=${lessonId}`;
        document.getElementById('btn-l4').href = `level4.html?id=${lessonId}`;
    </script>
</body>
</html>
