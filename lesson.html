<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程選單</title>
    <script src="data.js"></script>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #eef2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 30px 20px; 
            box-sizing: border-box; 
        }
        
        /* 升級為滿版大容器 */
        .main-container { 
            position: relative; 
            width: 100%; 
            max-width: 1400px; 
            min-height: 85vh; 
            background-color: #fdf5e6; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 4%; 
            box-sizing: border-box; 
        }

        .header-area { 
            text-align: center; 
            margin-bottom: 50px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        /* 按鈕自適應放大 */
        .back-btn { 
            position: absolute; 
            left: 10px; 
            background-color: #3498db; 
            color: white; 
            text-decoration: none; 
            font-size: clamp(16px, 1.5vw, 24px); 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .back-btn:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        h1 { 
            color: #5a4a42; 
            font-size: clamp(32px, 3.5vw, 55px); 
            margin: 0; 
        }

        /* 升級為 Grid 網格，讓四個按鈕均分空間且自動換行 */
        .cards-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 30px; 
            width: 100%; 
            max-width: 1200px;
            flex-grow: 1; /* 讓按鈕區塊自動填滿剩下的高度 */
            align-content: center; /* 垂直置中 */
        }

        /* 卡片大幅度放大，增加點擊熱區 */
        .level-card { 
            background: white; 
            border-radius: 25px; 
            border: 5px solid transparent; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 20px; 
            text-decoration: none; 
            transition: 0.3s; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            min-height: 250px; 
        }

        .level-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
        }

        .icon { font-size: clamp(60px, 6vw, 100px); margin-bottom: 20px; }
        .level-num { font-size: clamp(20px, 1.5vw, 26px); font-weight: bold; margin-bottom: 10px; }
        .level-name { font-size: clamp(26px, 2.2vw, 36px); font-weight: bold; }

        /* 顏色區分保持不變 */
        #btn-l1 { border-color: #ff9ff3; color: #f368e0; }
        #btn-l2 { border-color: #feca57; color: #ff9f43; }
        #btn-l3 { border-color: #1dd1a1; color: #10ac84; }
        #btn-l4 { border-color: #48dbfb; color: #0abde3; }

        /* 手機或平板窄螢幕優化，避免返回鍵擋住標題 */
        @media (max-width: 768px) {
            .header-area {
                flex-direction: column;
                gap: 20px;
                margin-bottom: 30px;
            }
            .back-btn {
                position: relative;
                left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-area">
            <a href="index.html" class="back-btn">🏠 回首頁</a>
            <h1 id="lesson-title">載入中...</h1>
        </div>
        <div class="cards-container">
            <a href="#" id="btn-l1" class="level-card">
                <div class="icon">🧩</div><div class="level-num">第一關</div><div class="level-name">部件拼拼樂</div>
            </a>
            <a href="#" id="btn-l2" class="level-card">
                <div class="icon">🃏</div><div class="level-num">第二關</div><div class="level-name">語詞翻翻樂</div>
            </a>
            <a href="#" id="btn-l3" class="level-card">
                <div class="icon">🕵️‍♂️</div><div class="level-num">第三關</div><div class="level-name">語詞我最行</div>
            </a>
            <a href="#" id="btn-l4" class="level-card">
                <div class="icon">👑</div><div class="level-num">第四關</div><div class="level-name">魔王大挑戰</div>
            </a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1";
        
        if (allLessonsData[lessonId]) {
            document.getElementById('lesson-title').innerText = allLessonsData[lessonId].title;
        }
        
        // 正確連結每一關
        document.getElementById('btn-l1').href = `level1.html?id=${lessonId}`;
        document.getElementById('btn-l2').href = `level2.html?id=${lessonId}`;
        document.getElementById('btn-l3').href = `level3.html?id=${lessonId}`;
        document.getElementById('btn-l4').href = `level4.html?id=${lessonId}`;
    </script>
</body>
</html>
