<!doctype html>
<html lang="zh-TW" class="h-full w-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第二關：生字拆解拉霸機 (多人搶答版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="data.js"></script>
    
    <style>
        /* 1. 強制全域套用標楷體，並加上 !important 確保優先權 */
        * {
            font-family: "標楷體", "DFKai-SB", "BiauKai", "Apple LiSung", serif !important;
        }

        body { 
            overflow: hidden; 
            touch-action: manipulation; 
            background-color: #f0f4f8;
        }

        /* 2. 針對拉霸機的大字進行特殊處理：移除粗體，改用文字陰影增加清晰度 */
        .slot-text {
            font-weight: normal !important; /* 標楷體不可設為 Black，否則會破功 */
            line-height: 1.2;
        }

        .buzzer-btn { 
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            box-shadow: 0 10px 0 #96281b, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        .buzzer-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #96281b, 0 5px 10px rgba(0,0,0,0.4); }
        .buzzer-btn:disabled { filter: grayscale(100%); cursor: not-allowed; transform: translateY(10px); box-shadow: none; }
        
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .reel-shadow { box-shadow: inset 0 20px 30px -10px rgba(0,0,0,0.3), inset 0 -20px 30px -10px rgba(0,0,0,0.3); }

        @keyframes pullLever {
            0% { transform: rotateX(0deg); }
            40% { transform: rotateX(75deg); }
            60% { transform: rotateX(75deg); }
            100% { transform: rotateX(0deg); }
        }
        .lever-pull { animation: pullLever 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .lever-wrapper { perspective: 800px; }
        
        .hide-scrollbar::-webkit-scrollbar { width: 6px; }
        .hide-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }

        .nav-btn {
            font-size: clamp(16px, 1.2vw, 20px);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: 0.2s;
            display: flex;
            align-items: center;
            border: 2px solid transparent;
            text-decoration: none;
            z-index: 100;
        }
        .nav-home { background-color: #3498db; color: white; border-color: #2980b9; }
        .nav-back { background-color: #95a5a6; color: white; border-color: #7f8c8d; }
    </style>
</head>
<body class="h-screen w-screen text-gray-800 relative">

    <div class="absolute top-4 left-4 flex gap-4 z-50">
        <a href="index.html" class="nav-btn nav-home">🏠 回總大廳</a>
        <a href="#" id="back-to-lesson" class="nav-btn nav-back">🔙 回課程選單</a>
    </div>

    <div id="app" class="w-full h-full flex flex-col items-center justify-center">
        <div id="loadingScreen" class="text-2xl">系統初始化中...</div>
    </div>

    <template id="tpl-landing">
        <div class="flex flex-col gap-8 items-center p-10 bg-white rounded-3xl shadow-2xl max-w-lg w-full text-center border-t-8 border-red-500 relative mt-16">
            <h1 class="text-4xl text-gray-800 mb-2">💎 語詞大挑戰</h1>
            <p class="text-xl text-blue-600" id="lesson-title-display">載入中...</p>
            <p class="text-gray-500 mb-4">超刺激的課堂單字搶答遊戲</p>
            <button onclick="initTeacher()" class="w-full py-6 text-2xl text-white bg-red-500 rounded-2xl shadow-lg hover:bg-red-600 transition hover:-translate-y-1">
                我是老師 (建立房間)
            </button>
            <div class="w-full border-t border-gray-200"></div>
            <div class="w-full text-center text-gray-500">學生請用平板掃描老師的 QR Code 加入</div>
        </div>
    </template>

    <template id="tpl-teacher">
        <div class="w-full h-full flex p-6 gap-6 overflow-hidden bg-gray-900 pt-20">
            <div class="flex-1 relative bg-gray-800 rounded-3xl shadow-inner flex flex-col items-center justify-center p-8 overflow-hidden border-4 border-gray-700">
                
                <div class="w-full max-w-5xl bg-red-600 rounded-3xl border-[16px] border-red-800 shadow-[0_15px_0_#7f1d1d,0_30px_50px_rgba(0,0,0,0.6)] p-6 relative flex flex-col items-center" style="height: 60vh;">
                    
                    <div class="w-full text-center text-yellow-300 text-3xl md:text-4xl mb-6 tracking-widest drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] border-b-4 border-red-800 pb-4">
                        💎 語詞大挑戰 💎
                    </div>

                    <div class="absolute top-1/2 -right-[46px] w-[30px] h-32 bg-gradient-to-r from-gray-500 to-gray-700 rounded-r-2xl border-y-4 border-r-4 border-gray-800 shadow-[10px_0_20px_rgba(0,0,0,0.6)] -translate-y-1/2 z-0 flex justify-center items-center">
                        <div class="w-3 h-24 bg-gray-900 rounded-full shadow-inner"></div>
                    </div>

                    <div class="lever-wrapper absolute top-1/2 -right-10 w-20 h-56 -translate-y-1/2 z-10 cursor-pointer flex justify-center" onclick="if(!document.getElementById('spinBtn').disabled) game.teacherSpin()">
                        <div id="leverRod" class="w-full h-full relative origin-bottom transition-transform duration-300">
                            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-4 h-32 bg-gradient-to-r from-gray-300 via-white to-gray-500 rounded-t-full shadow-[inset_-2px_0_5px_rgba(0,0,0,0.3)]"></div>
                            <div class="absolute top-[10px] left-1/2 -translate-x-1/2 w-14 h-14 bg-gradient-to-br from-red-400 via-red-600 to-red-900 rounded-full shadow-[0_8px_15px_rgba(0,0,0,0.5)]"></div>
                        </div>
                    </div>

                    <div class="w-full flex-1 bg-gray-200 rounded-2xl border-[12px] border-gray-300 flex items-center justify-center overflow-hidden relative p-3 gap-4 z-10">
                        <div id="reel1-container" class="w-1/2 h-full bg-white rounded-xl overflow-hidden relative border-2 border-gray-400 reel-shadow">
                            <div id="reel1-strip" class="w-full h-full flex flex-col">
                                <div class="w-full h-full flex items-center justify-center text-7xl md:text-[8rem] text-gray-800 text-center px-2 slot-text">準</div>
                            </div>
                        </div>
                        <div id="reel2-container" class="w-1/2 h-full bg-white rounded-xl overflow-hidden relative border-2 border-gray-400 reel-shadow">
                            <div id="reel2-strip" class="w-full h-full flex flex-col">
                                <div class="w-full h-full flex items-center justify-center text-7xl md:text-[8rem] text-gray-800 text-center px-2 slot-text">備</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="winnerArea" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm">
                    <div id="winnerMsg" class="bg-gradient-to-b from-yellow-400 to-yellow-600 text-red-900 px-16 py-10 rounded-3xl shadow-[0_0_100px_rgba(253,224,71,0.5)] text-6xl md:text-8xl border-8 border-white pop-in text-center flex flex-col gap-6">
                        <span id="winnerName" class="text-white drop-shadow-lg"></span>
                        <span class="text-4xl md:text-5xl">搶答成功！</span>
                    </div>
                </div>
            </div>

            <div class="w-[350px] bg-white rounded-3xl shadow-lg flex flex-col p-5 overflow-hidden border-4 border-gray-300 z-20 relative">
                <div class="mb-4 text-center flex-none">
                    <h2 class="text-2xl text-gray-800 tracking-wider mb-2">控制台</h2>
                    <div class="text-sm text-blue-600 bg-blue-50 py-1 rounded-lg mb-2" id="teacherLessonTitle"></div>
                    <div id="qrcode" class="flex justify-center my-2 p-2 bg-white border-2 border-dashed border-gray-300 rounded-xl mx-auto w-fit"></div>
                    <input type="text" id="roomIdDisplay" class="w-full text-center text-xs text-gray-500 bg-gray-100 py-2 rounded-lg border-none focus:ring-0 cursor-copy" readonly onclick="this.select();" />
                </div>

                <div class="mb-4 flex-none">
                    <h3 class="text-sm text-gray-600 mb-2 flex justify-between items-center border-b pb-1">
                        <span>📚 本課題庫</span>
                        <span class="text-xs text-green-600 bg-green-100 px-2 py-0.5 rounded-full" id="wordCountDisplay"></span>
                    </h3>
                    <div class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto hide-scrollbar p-2 bg-gray-50 rounded-lg border" id="wordListDisplay"></div>
                </div>

                <div class="flex-1 overflow-y-auto mb-4 border-2 border-gray-200 rounded-xl p-2 bg-gray-50 relative hide-scrollbar">
                    <h3 class="text-sm text-gray-600 mb-2 sticky top-0 bg-gray-50 pb-1 border-b z-10">已連線學生 (<span id="studentCount" class="text-blue-600">0</span>)</h3>
                    <div id="studentList" class="space-y-2"></div>
                </div>

                <div class="flex flex-col gap-2 mt-auto z-10 flex-none">
                    <button id="spinBtn" onclick="game.teacherSpin()" class="py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl text-2xl shadow-[0_6px_0_#991b1b] hover:translate-y-1 hover:shadow-[0_4px_0_#991b1b] active:translate-y-2 active:shadow-none transition-all disabled:opacity-50 tracking-widest">
                        啟動拉桿！
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-student">
        <div class="w-full h-full flex flex-col items-center justify-between p-6 bg-slate-900 text-white relative overflow-hidden pt-20">
            <div class="w-full flex justify-between items-center z-10 bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/20 max-w-md">
                <div class="text-lg opacity-90">代號: <span id="myStudentName" class="text-yellow-400 text-2xl"></span></div>
                <div class="px-4 py-2 bg-white/20 rounded-full text-sm flex items-center gap-2" id="connectionStatus">連線中</div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-center w-full z-10">
                <div id="studentMessage" class="text-2xl text-gray-400 mb-6">等待老師啟動拉霸機...</div>
                <div id="studentWord" class="text-6xl md:text-8xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] hidden pop-in text-center break-all leading-tight slot-text"></div>
            </div>

            <div class="w-full max-w-md aspect-square mb-8 z-10 flex items-center justify-center">
                <button id="buzzerBtn" onclick="game.studentBuzz()" disabled 
                    class="buzzer-btn w-64 h-64 rounded-full text-6xl text-white border-8 border-red-900 flex flex-col items-center justify-center gap-2">
                    <span>搶答</span>
                    <span class="text-base opacity-80 mt-2">(等待轉停)</span>
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-login">
        <div class="flex flex-col gap-6 items-center p-10 bg-white rounded-3xl shadow-2xl max-w-sm w-full mx-4 border-t-8 border-red-500 relative mt-16">
            <h2 class="text-3xl text-gray-800">加入房間</h2>
            <div class="w-full">
                <input type="text" id="inputName" placeholder="請輸入名字" class="w-full px-4 py-4 bg-gray-50 border-2 border-gray-300 rounded-xl text-xl focus:border-red-500 outline-none text-center transition-all text-gray-700">
            </div>
            <button onclick="joinGame()" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white rounded-xl text-2xl shadow-[0_6px_0_#991b1b] active:translate-y-2 active:shadow-none transition-all">進入遊戲</button>
        </div>
    </template>

    <script>
        // --- 核心變數與初始化 ---
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1";
        const joinId = urlParams.get('join');
        document.getElementById('back-to-lesson').href = `lesson.html?id=${lessonId}`;

        const currentLesson = allLessonsData[lessonId];
        let gameWords = [];
        if (currentLesson) {
            let l3Words = (currentLesson.level3 || []).map(q => q.answer);
            let l4Words = (currentLesson.level4 || []).map(q => q.text);
            gameWords = [...new Set([...l3Words, ...l4Words])].filter(w => w && w.length >= 2);
        }

        let peer = null, connections = [], myConn = null, isTeacher = false, currentStudentName = "", buzzerLocked = false; 

        document.addEventListener('DOMContentLoaded', () => {
            if (joinId) {
                showTemplate('tpl-login');
                window.roomId = joinId;
            } else {
                showTemplate('tpl-landing');
                if (currentLesson) document.getElementById('lesson-title-display').innerText = currentLesson.title;
            }
        });

        function showTemplate(id) { document.getElementById('app').innerHTML = document.getElementById(id).innerHTML; }

        function initTeacher() {
            if (gameWords.length === 0) return alert("找不到語詞資料！");
            showTemplate('tpl-teacher');
            isTeacher = true;
            document.getElementById('teacherLessonTitle').innerText = currentLesson.title;
            document.getElementById('wordCountDisplay').innerText = `共 ${gameWords.length} 詞`;
            document.getElementById('wordListDisplay').innerHTML = gameWords.map(w => `<span class="bg-white border border-gray-200 px-2 py-1 rounded shadow-sm">${w}</span>`).join('');

            peer = new Peer(null, { debug: 2 });
            peer.on('open', (id) => {
                const joinUrl = `${window.location.href.split('?')[0]}?id=${lessonId}&join=${id}`;
                document.getElementById('roomIdDisplay').value = joinUrl;
                new QRCode(document.getElementById("qrcode"), { text: joinUrl, width: 140, height: 140 });
            });
            peer.on('connection', (conn) => {
                conn.on('data', (data) => handleTeacherData(conn, data));
                conn.on('close', () => removeStudent(conn.peer));
            });
        }

        function handleTeacherData(conn, data) {
            if (data.type === 'JOIN') {
                conn.studentName = data.name; conn.score = 0; connections.push(conn);
                updateStudentList();
                conn.send({ type: 'WELCOME' });
            } else if (data.type === 'BUZZ' && !buzzerLocked) {
                buzzerLocked = true;
                broadcast({ type: 'WINNER', name: conn.studentName });
                highlightWinner(conn.studentName);
            }
        }

        function removeStudent(peerId) { connections = connections.filter(c => c.peer !== peerId); updateStudentList(); }

        function updateStudentList() {
            const list = document.getElementById('studentList');
            document.getElementById('studentCount').textContent = connections.length;
            list.innerHTML = connections.map(conn => `
                <div id="student-${conn.peer}" class="flex items-center justify-between p-3 mb-2 bg-white border border-gray-200 rounded-xl">
                    <span class="text-gray-700 text-lg truncate w-24">${conn.studentName}</span>
                    <div class="flex items-center gap-3">
                        <span class="score-badge bg-yellow-100 text-yellow-800 px-3 py-1.5 rounded-lg min-w-[4rem] text-center">${conn.score} 分</span>
                        <button onclick="addScore('${conn.peer}', 1)" class="text-white bg-green-500 rounded-lg px-3 py-1.5 text-sm">+1</button>
                    </div>
                </div>
            `).join('');
        }

        function addScore(peerId, points) {
            const conn = connections.find(c => c.peer === peerId);
            if (conn) {
                conn.score += points;
                updateStudentList();
            }
        }

        function highlightWinner(name) {
            const winnerArea = document.getElementById('winnerArea');
            document.getElementById('winnerName').textContent = name;
            winnerArea.classList.remove('hidden');
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').innerHTML = "🎰 下一題！";
        }

        function broadcast(data) { connections.forEach(c => c.send(data)); }

        function joinGame() {
            const name = document.getElementById('inputName').value.trim();
            if (!name) return alert("請輸入名字！");
            currentStudentName = name;
            showTemplate('tpl-student');
            document.getElementById('myStudentName').textContent = name;
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(window.roomId);
                conn.on('open', () => {
                    document.getElementById('connectionStatus').textContent = "已連線";
                    conn.send({ type: 'JOIN', name: currentStudentName });
                    myConn = conn;
                });
                conn.on('data', handleStudentData);
            });
        }

        function handleStudentData(data) {
            const msgEl = document.getElementById('studentMessage'), wordEl = document.getElementById('studentWord'), btn = document.getElementById('buzzerBtn');
            if (data.type === 'SPIN_START') {
                msgEl.textContent = "🎰 拉霸轉動中..."; wordEl.classList.add('hidden'); btn.disabled = true;
            } else if (data.type === 'SPIN_RESULT') {
                msgEl.textContent = "👇 快按搶答！"; wordEl.innerHTML = data.word; wordEl.classList.remove('hidden'); btn.disabled = false;
            } else if (data.type === 'WINNER') {
                btn.disabled = true;
                msgEl.textContent = (data.name === currentStudentName) ? "🎉 恭喜搶到了！" : `❌ ${data.name} 搶先了`;
            } else if (data.type === 'RESET') {
                msgEl.textContent = "等待老師啟動..."; wordEl.classList.add('hidden'); btn.disabled = true;
            }
        }

        const game = {
            teacherSpin: async function() {
                const spinBtn = document.getElementById('spinBtn');
                spinBtn.disabled = true; buzzerLocked = true;
                document.getElementById('winnerArea').classList.add('hidden');
                broadcast({ type: 'RESET' });
                
                setTimeout(async () => {
                    broadcast({ type: 'SPIN_START' });
                    const targetWord = gameWords[Math.floor(Math.random() * gameWords.length)];
                    const pool1 = gameWords.map(w => w.charAt(0)), pool2 = gameWords.map(w => w.substring(1) || " ");
                    const p1 = this.executePhysicalSpin('reel1-container', 'reel1-strip', 3000, targetWord.charAt(0), pool1);
                    const p2 = this.executePhysicalSpin('reel2-container', 'reel2-strip', 4500, targetWord.substring(1) || " ", pool2);
                    await Promise.all([p1, p2]);
                    buzzerLocked = false; spinBtn.disabled = false;
                    broadcast({ type: 'SPIN_RESULT', word: targetWord });
                }, 100);
            },
            executePhysicalSpin: function(containerId, stripId, duration, finalChar, charPool) {
                return new Promise(resolve => {
                    const container = document.getElementById(containerId), strip = document.getElementById(stripId);
                    const cellHeight = container.clientHeight;
                    const spins = 30;
                    let stripHtml = '';
                    for(let i = 0; i < spins - 1; i++) {
                        stripHtml += `<div class="w-full flex-shrink-0 flex items-center justify-center text-7xl md:text-[8rem] text-gray-800 slot-text" style="height: ${cellHeight}px;">${charPool[Math.floor(Math.random() * charPool.length)]}</div>`;
                    }
                    stripHtml += `<div class="w-full flex-shrink-0 flex items-center justify-center text-7xl md:text-[8rem] text-red-600 slot-text" style="height: ${cellHeight}px;">${finalChar}</div>`;
                    strip.innerHTML = stripHtml;
                    strip.style.transition = 'none'; strip.style.transform = `translateY(0px)`;
                    void strip.offsetHeight;
                    strip.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0.85, 0.2, 1.05)`;
                    strip.style.transform = `translateY(${-(spins - 1) * cellHeight}px)`;
                    setTimeout(() => resolve(), duration);
                });
            },
            studentBuzz: function() { if (myConn?.open) myConn.send({ type: 'BUZZ' }); }
        };
    </script>
</body>
</html>
