<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲網</title>
    <script src="data.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; background-color: #eef2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .canvas-16-9 { position: relative; width: 95vw; max-width: 1400px; aspect-ratio: 16 / 9; background-color: #fdf5e6; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; padding: 3%; box-sizing: border-box; overflow: hidden; }
        .header-area { text-align: center; margin-bottom: 3%; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #5a4a42; font-size: 3.5vw; margin: 0 0 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .subtitle { font-size: 1.8vw; color: #7b6855; margin: 0; }
        .qr-box { position: absolute; top: 3%; right: 3%; background: #fff; padding: 10px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; border: 3px dashed #f39c12; }
        .qr-box p { margin: 0 0 5px 0; font-size: 1vw; font-weight: bold; color: #e74c3c; }
        .qr-box img { width: 7vw; height: 7vw; min-width: 70px; min-height: 70px; }
        .lesson-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5vw; width: 100%; overflow-y: auto; padding: 1vw; }
        .lesson-card { background-color: #ffffff; border-radius: 1.5vw; box-shadow: 0 6px 12px rgba(0,0,0,0.08); text-decoration: none; display: flex; align-items: center; justify-content: center; transition: 0.3s; border: 3px solid #3498db; width: 28%; height: 100px; box-sizing: border-box; padding: 10px; }
        .lesson-card:hover { transform: translateY(-5px); background-color: #eafaf1; border-color: #2ecc71; }
        .lesson-title { font-size: 1.8vw; font-weight: bold; color: #2c3e50; text-align: center; line-height: 1.2; }
    </style>
</head>
<body>
    <div class="canvas-16-9">
        <div class="qr-box">
            <p>📱 掃描進遊戲</p>
            <img id="qr-code-image" src="" alt="QR Code">
        </div>
        <div class="header-area">
            <h1>🏫 特教國語遊戲網 🎪</h1>
            <p class="subtitle">請選擇今天要挑戰的課程！</p>
        </div>
        <div class="lesson-list" id="lesson-container"></div>
    </div>
    <script>
        window.onload = function() {
            let cleanUrl = window.location.href.split('#')[0].split('?')[0]; 
            document.getElementById('qr-code-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(cleanUrl);
            const container = document.getElementById('lesson-container');
            for (let id in allLessonsData) {
                const card = document.createElement('a');
                card.href = `lesson.html?id=${id}`; 
                card.className = 'lesson-card';
                const title = document.createElement('div');
                title.className = 'lesson-title';
                title.innerText = allLessonsData[id].title; 
                card.appendChild(title);
                container.appendChild(card);
            }
        };
    </script>
</body>
</html>
