<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年級國語樂園首頁</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #fdf5e6;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 4%;
            box-sizing: border-box;
        }

        .header-area {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #4a5568;
            font-size: clamp(32px, 4vw, 50px);
            margin: 0;
            letter-spacing: 2px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 橫式一行 4 個 */
            gap: 25px;
            width: 100%;
            max-width: 1400px;
        }

        .lesson-card {
            background: white;
            border-radius: 15px;
            border: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px 20px;
            text-decoration: none;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            user-select: none; /* 適合平板操作，防反白 */
        }

        .lesson-card:hover, .lesson-card:active {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }

        .lesson-num {
            font-size: clamp(24px, 2vw, 30px);
            font-weight: bold;
            color: #00897b;
            margin-bottom: 12px;
        }

        .lesson-name {
            font-size: clamp(16px, 1.5vw, 20px);
            color: #718096;
        }

        /* 還原您圖片中的四色直排邊框 */
        .lesson-card:nth-child(4n+1) { border-color: #fbc531; } /* 橘黃 */
        .lesson-card:nth-child(4n+2) { border-color: #4cd137; } /* 綠色 */
        .lesson-card:nth-child(4n+3) { border-color: #00a8ff; } /* 藍色 */
        .lesson-card:nth-child(4n+4) { border-color: #9c88ff; } /* 紫色 */

        /* 針對小螢幕平板的響應式調整 */
        @media (max-width: 1024px) { .cards-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .cards-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header-area">
        <h1>🎡 國語樂園 🎡</h1>
    </div>

    <div class="cards-container">
        <a href="lesson.html?id=1" class="lesson-card"><div class="lesson-num">第一課</div><div class="lesson-name">最美的模樣</div></a>
        <a href="lesson.html?id=2" class="lesson-card"><div class="lesson-num">第二課</div><div class="lesson-name">玩玩具</div></a>
        <a href="lesson.html?id=3" class="lesson-card"><div class="lesson-num">第三課</div><div class="lesson-name">愛玉的變身術</div></a>
        <a href="lesson.html?id=4" class="lesson-card"><div class="lesson-num">第四課</div><div class="lesson-name">楊修猜字</div></a>
        <a href="lesson.html?id=5" class="lesson-card"><div class="lesson-num">第五課</div><div class="lesson-name">唱反調</div></a>
        <a href="lesson.html?id=6" class="lesson-card"><div class="lesson-num">第六課</div><div class="lesson-name">一飛沖天</div></a>
        <a href="lesson.html?id=7" class="lesson-card"><div class="lesson-num">第七課</div><div class="lesson-name">井仔腳鹽田</div></a>
        <a href="lesson.html?id=8" class="lesson-card"><div class="lesson-num">第八課</div><div class="lesson-name">和魚一起游泳</div></a>
        <a href="lesson.html?id=9" class="lesson-card"><div class="lesson-num">第九課</div><div class="lesson-name">三峽老街樂藍染</div></a>
        <a href="lesson.html?id=10" class="lesson-card"><div class="lesson-num">第十課</div><div class="lesson-name">地球的眼淚</div></a>
        <a href="lesson.html?id=11" class="lesson-card"><div class="lesson-num">第十一課</div><div class="lesson-name">枯木是大飯店</div></a>
        <a href="lesson.html?id=12" class="lesson-card"><div class="lesson-num">第十二課</div><div class="lesson-name">騎樓</div></a>
    </div>
</body>
</html>
