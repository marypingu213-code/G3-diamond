<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年級國語樂園</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50; /* 外圍深色背景，凸顯中間的遊戲區 */
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
        }

        .container {
            /* 嚴格維持 16:9 比例 */
            width: 100vw;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #e0f7fa, #80deea);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 4rem;
            color: #006064;
            margin-bottom: 60px;
            text-shadow: 3px 3px 6px rgba(255,255,255,0.8);
            letter-spacing: 4px;
            font-weight: 900;
        }

        .button-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            width: 90%;
        }

        .nav-btn {
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 240px;
            height: 110px;
            background-color: #ffffff;
            font-size: 2.2rem;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            border: 6px solid transparent;
            user-select: none; /* 防止誤觸反白文字 */
        }

        /* 點擊與懸浮的互動回饋 */
        .nav-btn:hover, .nav-btn:active {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.25);
        }

        /* 為不同路徑設計專屬顏色與邊框 */
        .btn-lesson { border-color: #ffb74d; color: #e65100; }
        .btn-lesson:hover, .btn-lesson:active { background-color: #fff3e0; }

        .btn-l1 { border-color: #81c784; color: #1b5e20; }
        .btn-l1:hover, .btn-l1:active { background-color: #e8f5e9; }

        .btn-l2 { border-color: #64b5f6; color: #0d47a1; }
        .btn-l2:hover, .btn-l2:active { background-color: #e3f2fd; }

        .btn-l3 { border-color: #ba68c8; color: #4a148c; }
        .btn-l3:hover, .btn-l3:active { background-color: #f3e5f5; }

        .btn-l4 { border-color: #f06292; color: #880e4f; }
        .btn-l4:hover, .btn-l4:active { background-color: #fce4ec; }

    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 三年級國語樂園 🎡</h1>
        
        <div class="button-grid">
            <a href="lesson.html" class="nav-btn btn-lesson">📖 課程內容</a>
            <a href="level1.html" class="nav-btn btn-l1">⭐ 第一關</a>
            <a href="level2.html" class="nav-btn btn-l2">⭐⭐ 第二關</a>
            <a href="level3.html" class="nav-btn btn-l3">⭐⭐⭐ 第三關</a>
            <a href="level4.html" class="nav-btn btn-l4">💎 第四關</a>
        </div>
    </div>

    </body>
</html>
