<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年級國語樂園</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50;
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
        }

        .container {
            width: 100vw;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background: #fbf8f1; /* 柔和的米白背景 */
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        h1 {
            font-size: 3.5rem;
            color: #2c3e50;
            margin-top: 10px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            width: 95%;
            height: 100%;
        }

        .lesson-btn {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border: 4px solid #e0e0e0;
            transition: transform 0.1s, box-shadow 0.1s;
            color: #333;
            user-select: none;
        }

        .lesson-btn:active {
            transform: scale(0.95);
        }

        .lesson-num {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00796b;
            margin-bottom: 8px;
        }

        .lesson-name {
            font-size: 1.4rem;
            color: #555;
        }

        /* 點擊回饋：依據不同行給予不同邊框顏色提示 */
        .lesson-btn:nth-child(4n+1) { border-color: #ffb74d; }
        .lesson-btn:nth-child(4n+2) { border-color: #81c784; }
        .lesson-btn:nth-child(4n+3) { border-color: #64b5f6; }
        .lesson-btn:nth-child(4n+4) { border-color: #ba68c8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 三年級國語樂園 🎡</h1>
        
        <div class="lesson-grid">
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第一課</div>
                <div class="lesson-name">最美的模樣</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第二課</div>
                <div class="lesson-name">玩玩具</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第三課</div>
                <div class="lesson-name">愛玉的變身術</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第四課</div>
                <div class="lesson-name">楊修猜字</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第五課</div>
                <div class="lesson-name">唱反調</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第六課</div>
                <div class="lesson-name">一飛沖天</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第七課</div>
                <div class="lesson-name">井仔腳鹽田</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第八課</div>
                <div class="lesson-name">和魚一起游泳</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第九課</div>
                <div class="lesson-name">三峽老街樂藍染</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第十課</div>
                <div class="lesson-name">地球的眼淚</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第十一課</div>
                <div class="lesson-name">枯木是大飯店</div>
            </a>
            <a href="lesson.html" class="lesson-btn">
                <div class="lesson-num">第十二課</div>
                <div class="lesson-name">騎樓</div>
            </a>
        </div>
    </div>
</body>
</html>
