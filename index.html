<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲網</title>
    <script src="data.js"></script>
    <style>
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: #eef2f5; 
            margin: 0; 
            /* 讓畫面從上方開始排，並留出邊距 */
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            padding: 30px 20px; 
            box-sizing: border-box;
        }

        /* 取代原本的 16-9 限制，改為自由延伸的滿版大容器 */
        .main-container { 
            position: relative; 
            width: 100%; 
            max-width: 1400px; 
            min-height: 85vh; 
            background-color: #fdf5e6; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 3%; 
            box-sizing: border-box; 
        }

        .header-area { 
            text-align: center; 
            margin-top: 20px;
            margin-bottom: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* 使用 clamp 讓字體在手機跟大螢幕都能自動縮放 */
        h1 { 
            color: #5a4a42; 
            font-size: clamp(32px, 4vw, 60px); 
            margin: 0 0 15px 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); 
        }
        
        .subtitle { 
            font-size: clamp(18px, 2vw, 28px); 
            color: #7b6855; 
            margin: 0; 
        }

        .qr-box { 
            position: absolute; 
            top: 30px; 
            right: 30px; 
            background: #fff; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
            border: 3px dashed #f39c12; 
        }

        .qr-box p { 
            margin: 0 0 8px 0; 
            font-size: 16px; 
            font-weight: bold; 
            color: #e74c3c; 
        }

        .qr-box img { 
            width: 100px; 
            height: 100px; 
        }

        /* 升級為 Grid 網格系統，自動排版永不擁擠 */
        .lesson-list { 
            display: grid; 
            /* 每格最小 280px，空間夠就自動分 3 排或 4 排 */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; /* 按鈕之間的超大間距 */
            width: 100%; 
            max-width: 1200px;
            padding: 20px; 
            box-sizing: border-box; 
        }

        .lesson-card { 
            background-color: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.08); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s; 
            border: 4px solid #3498db; 
            min-height: 130px; /* 按鈕長高，更好點擊 */
            box-sizing: border-box; 
            padding: 15px 20px; 
        }

        .lesson-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            background-color: #eafaf1; 
            border-color: #2ecc71; 
        }

        .lesson-title { 
            font-size: clamp(20px, 1.8vw, 26px); 
            font-weight: bold; 
            color: #2c3e50; 
            text-align: center; 
            line-height: 1.4; 
        }

        /* 針對螢幕較小的平板或手機做 QR Code 隱藏或縮小 */
        @media (max-width: 768px) {
            .qr-box {
                display: none; /* 小螢幕直接隱藏 QR Code，避免擋住標題 */
            }
            .header-area {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="qr-box">
            <p>📱 掃描進遊戲</p>
            <img id="qr-code-image" src="" alt="QR Code">
        </div>
        <div class="header-area">
            <h1>🏫 特教國語遊戲網 🎪</h1>
            <p class="subtitle">請選擇今天要挑戰的課程！</p>
        </div>
        <div class="lesson-list" id="lesson-container"></div>
    </div>
    <script>
        window.onload = function() {
            let cleanUrl = window.location.href.split('#')[0].split('?')[0]; 
            document.getElementById('qr-code-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(cleanUrl);
            
            const container = document.getElementById('lesson-container');
            
            for (let id in allLessonsData) {
                const card = document.createElement('a');
                card.href = `lesson.html?id=${id}`; 
                card.className = 'lesson-card';
                
                const title = document.createElement('div');
                title.className = 'lesson-title';
                title.innerText = allLessonsData[id].title; 
                
                card.appendChild(title);
                container.appendChild(card);
            }
        };
    </script>
</body>
</html>
