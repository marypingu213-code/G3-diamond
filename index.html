<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲網</title>
    <script src="data.js"></script>
    <style>
        /* 讓 body 直接套用米黃色背景，不再有雙層背景 */
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: #fdf5e6; 
            margin: 0; 
            padding: 0;
            min-height: 100vh; 
        }

        /* 拿掉最大寬度限制、拿掉圓角、拿掉陰影，徹底 100% 滿版 */
        .main-container { 
            position: relative; 
            width: 100%; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 3%; 
            box-sizing: border-box; 
        }

        .header-area { 
            text-align: center; 
            margin-top: 20px;
            margin-bottom: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { 
            color: #5a4a42; 
            font-size: clamp(36px, 4.5vw, 70px); 
            margin: 0 0 15px 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); 
        }
        
        .subtitle { 
            font-size: clamp(20px, 2.5vw, 32px); 
            color: #7b6855; 
            margin: 0; 
        }

        .qr-box { 
            position: absolute; 
            top: 30px; 
            right: 40px; 
            background: #fff; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
            border: 3px dashed #f39c12; 
        }

        .qr-box p { margin: 0 0 8px 0; font-size: 16px; font-weight: bold; color: #e74c3c; }
        .qr-box img { width: 120px; height: 120px; }

        /* 網格自動延伸填滿 */
        .lesson-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 35px; 
            width: 100%; 
            max-width: 1600px; /* 放寬按鈕區的最大延伸範圍 */
            padding: 20px; 
            box-sizing: border-box; 
        }

        .lesson-card { 
            background-color: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.08); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s; 
            border: 4px solid #3498db; 
            min-height: 140px; 
            box-sizing: border-box; 
            padding: 15px 20px; 
        }

        .lesson-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            background-color: #eafaf1; 
            border-color: #2ecc71; 
        }

        .lesson-title { font-size: clamp(22px, 2vw, 30px); font-weight: bold; color: #2c3e50; text-align: center; line-height: 1.4; }

        @media (max-width: 768px) {
            .qr-box { display: none; }
            .header-area { margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="qr-box">
            <p>📱 掃描進遊戲</p>
            <img id="qr-code-image" src="" alt="QR Code">
        </div>
        <div class="header-area">
            <h1>🏫 特教國語遊戲網 🎪</h1>
            <p class="subtitle">請選擇今天要挑戰的課程！</p>
        </div>
        <div class="lesson-list" id="lesson-container"></div>
    </div>
    <script>
        window.onload = function() {
            let cleanUrl = window.location.href.split('#')[0].split('?')[0]; 
            document.getElementById('qr-code-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(cleanUrl);
            
            const container = document.getElementById('lesson-container');
            for (let id in allLessonsData) {
                const card = document.createElement('a');
                card.href = `lesson.html?id=${id}`; 
                card.className = 'lesson-card';
                const title = document.createElement('div');
                title.className = 'lesson-title';
                title.innerText = allLessonsData[id].title; 
                card.appendChild(title);
                container.appendChild(card);
            }
        };
    </script>
</body>
</html>
