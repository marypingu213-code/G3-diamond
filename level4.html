<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第四關：語詞配對大挑戰</title>
    <script src="data.js"></script>
    <style>
        :root {
            --font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            --primary-color: #2196F3;
            --match-color: #4CAF50;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4c3;
            font-family: var(--font-family);
            padding: 20px;
            box-sizing: border-box;
        }

        .header-area {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-btns { display: flex; gap: 15px; }

        .nav-btn {
            background-color: #fff;
            color: #558b2f;
            text-decoration: none;
            font-size: clamp(16px, 1.5vw, 24px);
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
            border: 2px solid #cddc39;
        }
        .nav-btn:hover { background-color: #f9fbe7; transform: scale(1.05); }

        .title-box {
            text-align: center;
            color: #558b2f;
        }
        .title-box h1 { margin: 0; font-size: clamp(28px, 3vw, 40px); }
        .title-box p { margin: 5px 0 0 0; font-size: clamp(18px, 2vw, 24px); font-weight: bold; }

        #btn-restart {
            padding: 12px 25px;
            font-size: clamp(18px, 2vw, 24px);
            background: #689f38;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        #btn-restart:hover { background: #558b2f; transform: scale(1.05); }

        .game-screen {
            width: 100%;
            max-width: 1500px;
            flex-grow: 1;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            display: grid;
            /* 預設 6行 x 3列 (共18張牌，9組配對) */
            grid-template-columns: repeat(6, 1fr); 
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            box-sizing: border-box;
            min-height: 60vh;
        }

        @media (max-width: 1024px) {
            .game-screen { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); }
        }
        @media (max-width: 600px) {
            .game-screen { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(6, 1fr); gap: 10px; padding: 15px;}
            .header-area { flex-direction: column; gap: 15px; }
        }

        .card { perspective: 1000px; cursor: pointer; }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            border: 4px solid #cddc39;
            box-sizing: border-box;
        }

        .card-front {
            background-color: #8bc34a;
            color: white;
            font-size: clamp(40px, 5vw, 80px);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0, rgba(255,255,255,0.1) 20px, transparent 20px, transparent 40px);
        }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }

        .card-back.text-node {
            font-size: clamp(28px, 3vw, 50px);
            color: #33691e;
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }

        .card-back img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .card.matched { opacity: 0.3; cursor: default; pointer-events: none; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <div class="header-area">
        <div class="header-btns">
            <a href="index.html" class="nav-btn">🏠 回總大廳</a>
            <a href="#" id="back-btn" class="nav-btn">🔙 回課程選單</a>
        </div>
        
        <div class="title-box">
            <h1 id="lesson-title">載入中...</h1>
            <p>⏱️ 計時：<span id="timer">0</span> 秒</p>
        </div>

        <button id="btn-restart" onclick="initGame()">重新開始 🔄</button>
    </div>

    <div class="game-screen" id="board"></div>

    <script>
        // 🌟 1. 動態取得目前是第幾課
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1"; 
        document.getElementById('back-btn').href = `lesson.html?id=${lessonId}`;
        
        let baseData = [];
        
        // 🌟 2. 從 data.js 中抓取那一課的 level4 資料！
        if (allLessonsData[lessonId]) {
            document.getElementById('lesson-title').innerText = "第四關：" + allLessonsData[lessonId].title;
            // 如果該課有 level4 資料就讀取，沒有就給空陣列
            baseData = allLessonsData[lessonId].level4 || [];
        }

        let firstCard = null, secondCard = null;
        let lockBoard = false, matchesFound = 0, seconds = 0, timer;
        const board = document.getElementById('board');
        const timerLabel = document.getElementById('timer');

        function initGame() {
            board.innerHTML = '';
            matchesFound = 0; seconds = 0; timerLabel.textContent = '0';
            clearInterval(timer);
            startTimer();

            // 🌟 3. 如果 data.js 裡這課的 level4 是空的，顯示提示
            if (baseData.length === 0) {
                board.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center; color: #e74c3c; align-self: center;">老師尚未建立這課的配對圖卡資料喔！</h2>';
                return;
            }

            let deck = [];
            baseData.forEach(item => {
                deck.push({ content: item.text, type: 'text', match: item.text });
                deck.push({ content: item.img, type: 'img', match: item.text });
            });

            // 洗牌
            deck.sort(() => Math.random() - 0.5);

            deck.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.match = data.match;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back ${data.type === 'text' ? 'text-node' : ''}">
                            ${data.type === 'text' ? data.content : `<img src="${data.content}" onerror="this.alt='圖片載入失敗'">`}
                        </div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard || this === firstCard) return;
            this.classList.add('flipped');
            speak(this.dataset.match); 

            if (!firstCard) { firstCard = this; return; }
            secondCard = this;
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.match === secondCard.dataset.match;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            setTimeout(() => {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                resetBoard();
                matchesFound++;
                if (matchesFound === baseData.length) {
                    clearInterval(timer);
                    setTimeout(() => {
                        alert(`🎉 恭喜過關！\n總共花了 ${seconds} 秒完成配對！`);
                    }, 300);
                }
            }, 600);
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }

        function startTimer() {
            timer = setInterval(() => { seconds++; timerLabel.textContent = seconds; }, 1000);
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-TW';
            synth.speak(utter);
        }

        window.onload = initGame;
    </script>
</body>
</html>
