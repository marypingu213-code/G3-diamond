<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第四關：語詞配對大挑戰</title>
    <script src="data.js"></script>
    <style>
        :root {
            --font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            --primary-color: #2196F3;
            --match-color: #4CAF50;
            --card-bg: #8bc34a;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            background-color: #f0f4c3;
            font-family: var(--font-family);
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden; 
        }

        /* 標題區：移除 1200px 限制，改用百分比讓大螢幕也寬廣 */
        .header-area {
            width: 95%;
            max-width: 2500px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header-btns { display: flex; gap: 15px; }

        .nav-btn {
            background-color: #fff;
            color: #558b2f;
            text-decoration: none;
            font-size: clamp(18px, 1.5vw, 28px); /* 隨螢幕變大的字體 */
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid #cddc39;
        }

        .title-box { text-align: center; color: #558b2f; }
        .title-box h1 { margin: 0; font-size: clamp(28px, 3vw, 50px); }
        .title-box p { margin: 5px 0 0 0; font-size: clamp(20px, 2vw, 32px); font-weight: bold; }

        #btn-restart {
            padding: 10px 25px;
            font-size: clamp(20px, 1.5vw, 28px);
            background: #689f38;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 🚀 大螢幕滿版遊戲網格 🚀 */
        .game-screen {
            width: 95%; /* 撐開寬度 */
            max-width: 2500px; 
            flex-grow: 1;
            background: white;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            /* 強制一行 6 個，適應大螢幕 */
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            box-sizing: border-box;
            max-height: calc(100vh - 150px);
        }

        .card { 
            perspective: 1500px; 
            cursor: pointer;
            height: 100%;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 25px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 25px;
            border: 5px solid #cddc39;
            box-sizing: border-box;
        }

        .card-front {
            background-color: var(--card-bg);
            color: white;
            font-size: clamp(60px, 8vw, 150px); /* 大螢幕下的問號會很大 */
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0, rgba(255,255,255,0.1) 20px, transparent 20px, transparent 40px);
        }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }

        .card-back.text-node {
            font-size: clamp(32px, 3.5vw, 80px); /* 讓語詞在大螢幕上超級清晰 */
            color: #1b5e20;
            font-weight: 900;
            text-align: center;
            padding: 10px;
        }

        .card-back img {
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
        }

        .card.matched { 
            opacity: 0.1; 
            pointer-events: none; 
            transform: scale(0.92);
            transition: all 0.5s;
        }

        /* 針對小螢幕與手機的降級處理 */
        @media (max-width: 800px) {
            .game-screen { gap: 10px; padding: 10px; }
            .card-front, .card-back { border-width: 3px; }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <div class="header-btns">
            <a href="index.html" class="nav-btn">🏠 回大廳</a>
            <a href="#" id="back-btn" class="nav-btn">🔙 回選單</a>
        </div>
        
        <div class="title-box">
            <h1 id="lesson-title">載入中...</h1>
            <p>⏱️ <span id="timer">0</span> 秒</p>
        </div>

        <button id="btn-restart" onclick="initGame()">🔄 重新開始</button>
    </div>

    <div class="game-screen" id="board"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1"; 
        document.getElementById('back-btn').href = `lesson.html?id=${lessonId}`;
        
        let baseData = [];
        if (typeof allLessonsData !== 'undefined' && allLessonsData[lessonId]) {
            document.getElementById('lesson-title').innerText = "第四關：" + allLessonsData[lessonId].title;
            baseData = allLessonsData[lessonId].level4 || [];
        }

        let firstCard = null, secondCard = null;
        let lockBoard = false, matchesFound = 0, seconds = 0, timer;
        const board = document.getElementById('board');
        const timerLabel = document.getElementById('timer');

        function initGame() {
            board.innerHTML = '';
            matchesFound = 0; seconds = 0; timerLabel.textContent = '0';
            clearInterval(timer);
            startTimer();

            if (baseData.length === 0) {
                board.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center;">資料庫 level4 尚未填寫喔！</h2>';
                return;
            }

            let deck = [];
            baseData.forEach(item => {
                deck.push({ content: item.text, type: 'text', match: item.text });
                deck.push({ content: item.img, type: 'img', match: item.text });
            });

            deck.sort(() => Math.random() - 0.5);

            deck.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.match = data.match;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back ${data.type === 'text' ? 'text-node' : ''}">
                            ${data.type === 'text' ? data.content : `<img src="${data.content}" onerror="this.style.visibility='hidden';">`}
                        </div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard || this === firstCard) return;
            this.classList.add('flipped');
            speak(this.dataset.match); 

            if (!firstCard) { firstCard = this; return; }
            secondCard = this;
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.match === secondCard.dataset.match;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            setTimeout(() => {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                resetBoard();
                matchesFound++;
                if (matchesFound === baseData.length) {
                    clearInterval(timer);
                    setTimeout(() => { alert(`🎉 太棒了！花了 ${seconds} 秒完成！`); }, 300);
                }
            }, 500);
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 800);
        }

        function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }
        function startTimer() { timer = setInterval(() => { seconds++; timerLabel.textContent = seconds; }, 1000); }
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-TW';
            synth.speak(utter);
        }
        window.onload = initGame;
    </script>
</body>
</html>
